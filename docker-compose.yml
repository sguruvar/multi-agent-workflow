services:

  # ─── Agent Application ────────────────────────────────────────────────────
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      OTEL_SERVICE_NAME: nysummit-agents
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_METRICS_EXPORTER: otlp
      OTEL_TRACES_EXPORTER: otlp
      DEPLOYMENT_ENV: local
    depends_on:
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── OpenTelemetry Collector ───────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC (from agent)
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus metrics scrape endpoint
    environment:
      DEPLOYMENT_ENV: local
    depends_on:
      - jaeger

  # ─── Jaeger (all-in-one) — trace backend ──────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.62
    ports:
      - "16686:16686"   # Jaeger UI
      - "14317:4317"    # OTLP gRPC (host-mapped to avoid collision with collector)
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  # ─── Prometheus — metrics backend ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    depends_on:
      - otel-collector

  # ─── Grafana — visualization ───────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - jaeger

  # ─── Load Generator ────────────────────────────────────────────────────────
  loadgen:
    build:
      context: ./loadgen
      dockerfile: Dockerfile
    environment:
      TARGET_URL: http://agent:8080
      RATE_PER_SEC: "1.0"
    depends_on:
      agent:
        condition: service_healthy

  # ─── Ollama (optional — local LLM, no cloud required) ─────────────────────
  # Run with: docker compose --profile local-llm up
  ollama:
    profiles: ["local-llm"]
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  prometheus_data:
  grafana_data:
  ollama_data:
