apiVersion: apps/v1
kind: Deployment
metadata:
  name: agents-app
  namespace: agents
  labels:
    app: agents-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agents-app
  template:
    metadata:
      labels:
        app: agents-app
    spec:
      containers:
        - name: agents-app
          image: agents-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: LLM_PROVIDER
              value: "bedrock"
            - name: AWS_REGION
              value: "us-east-1"
            - name: BEDROCK_MODEL
              value: "us.anthropic.claude-haiku-4-5-20251001-v1:0"
            - name: OTEL_SERVICE_NAME
              value: "customer-support-agent"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "grpc"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.agents.svc.cluster.local:4317"
          envFrom:
            - secretRef:
                name: aws-credentials
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: agents-app
  namespace: agents
spec:
  type: NodePort
  selector:
    app: agents-app
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
