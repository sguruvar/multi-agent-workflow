apiVersion: v1
kind: ServiceAccount
metadata:
  name: grafana
  namespace: agents
  annotations:
    eks.amazonaws.com/role-arn: "${ADOT_ROLE_ARN}"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: agents
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: AMP
        type: prometheus
        uid: prometheus
        access: proxy
        url: ${AMP_ENDPOINT}
        isDefault: true
        editable: true
        jsonData:
          httpMethod: "POST"
          sigV4Auth: true
          sigV4AuthType: "default"
          sigV4Region: "${AWS_REGION}"
      - name: Traces (Tempo)
        type: tempo
        uid: jaeger
        access: proxy
        url: http://tempo.agents.svc.cluster.local:3200
        editable: true
        jsonData:
          nodeGraph:
            enabled: true
          search:
            hide: false
          tracesToMetrics:
            datasourceUid: prometheus
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: agents
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      serviceAccountName: grafana
      containers:
        - name: grafana
          image: grafana/grafana:12.4.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: "Admin"
            - name: GF_AUTH_SIGV4_AUTH_ENABLED
              value: "true"
            - name: AWS_SDK_LOAD_CONFIG
              value: "true"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: agents
spec:
  type: ClusterIP
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
